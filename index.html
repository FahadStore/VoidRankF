<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rank F: Void — رواية تفاعلية</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;700;800;900&family=Noto+Sans+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ========== CINEMATIC OPENING ========== -->
  <div class="opening-overlay" id="openingOverlay">
    <div class="opening-particles" id="openingParticles"></div>
    <div class="opening-vignette"></div>
    <div class="opening-center">
      <div class="opening-logo">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#4d8aff" stroke-width="1.5">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <path d="M12 8v4" stroke-width="2" stroke-linecap="round"/>
          <circle cx="12" cy="16" r="1" fill="#4d8aff"/>
        </svg>
      </div>
      <div class="opening-title">Rank F: Void</div>
      <div class="opening-subtitle">رواية تفاعلية</div>
      <div class="opening-line"></div>
    </div>
  </div>

  <!-- ========== AMBIENT BG ========== -->
  <div class="ambient-bg">
    <div class="ambient-orb"></div>
    <div class="ambient-orb"></div>
    <div class="ambient-orb"></div>
  </div>

  <!-- Particles -->
  <div class="particles-container" id="particles"></div>

  <!-- Spark Canvas -->
  <canvas class="spark-canvas" id="sparkCanvas"></canvas>

  <!-- FX overlays -->
  <div class="fx-overlay fx-explosion" id="fxExplosion"></div>
  <div class="fx-overlay fx-fire" id="fxFire"></div>
  <div class="fx-overlay fx-ice" id="fxIce"></div>

  <!-- Progress -->
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <!-- Top Nav -->
  <div class="top-nav" id="topNav">
    <div class="nav-title">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      <span>Rank F: Void</span>
    </div>

    <div class="nav-buttons">
      <button class="nav-btn" id="themeToggle" onclick="toggleTheme()">☀️ نهاري</button>
      <button class="nav-btn" onclick="toggleChapterList()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8 21h12a2 2 0 002-2v-2H10v2a2 2 0 01-2 2z"/>
          <path d="M14 17V5a2 2 0 00-2-2H6a2 2 0 00-2 2v14a2 2 0 002 2h2"/>
        </svg>
        الفصول
      </button>
    </div>
  </div>

  <!-- Chapter List -->
  <div class="chapter-list" id="chapterList"></div>

  <!-- Main Content -->
  <div class="content" id="mainContent"></div>

  <script src="script.js"></script>
</body>
</html>
